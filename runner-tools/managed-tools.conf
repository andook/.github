# managed-tools.conf — the declarative inventory of host-level CI tooling.
#
# THIS IS THE SINGLE EDIT POINT for "what is pre-installed on the runners".
# Add a line here, re-run the deploy (scripts/10-ms-a2-runner-toolchain.sh for
# MS-A2 x64, scripts/11-pi-runner-install.sh for the Pi arm64), and the tool is
# installed everywhere and tracked for updates. The weekly
# runner-tools-update.timer keeps every tool listed here at its latest version
# automatically — you do not edit anything to *update*, only to *add/remove*.
#
# Deployed to each host as /etc/github-runner-tools.conf and consumed by
# /usr/local/sbin/runner-tools-update.sh (both provision-time and the weekly
# timer run the same updater against this file).
#
# Scope (ADR-032, the ephemeral posture): host tooling is *programs only* —
# slow-to-install, language-agnostic binaries shared across every job. Toolchain
# channels/components (rustup toolchains, clippy, targets) and project deps
# (cargo registry, pnpm store, pip wheels) are workflow-managed per-job and are
# NOT listed here. The actions-runner binary itself is deliberately NOT here: it
# is pinned in .env (ACTIONS_RUNNER_VERSION) and runs --disableupdate so it stays
# aligned with the register/cleanup helpers.
#
# Columns (whitespace-separated; "-" means not-applicable):
#   name      source     spec                  asset
#
#   source=apt        distro package. spec/asset unused.
#                     Tracks whatever the distro repos ship (may lag upstream).
#
#   source=apt-repo   upstream vendor apt repo. `spec` is a repo-id whose key +
#                     sources.list details live in the repo registry inside
#                     runner-tools-update.sh (one auditable function per repo).
#                     A single `apt-get install` then keeps it at upstream-latest.
#                     This is the preferred source for tools that publish their
#                     own repo (freshest builds; see `gh` below).
#
#   source=installer  tools with a bespoke OFFICIAL installer that is neither apt
#                     nor a GitHub-release asset (e.g. AWS CLI v2's bundled
#                     installer). `spec` is an installer-id whose `install_<id>`
#                     function lives in runner-tools-update.sh's installer
#                     registry — the one auditable place its download URL lives.
#
#   source=github     fallback for tools with no apt repo. `spec` is owner/repo;
#                     `asset` is the release-asset name with the {arch} token
#                     (expands to amd64 / arm64) and, where needed, {tag}. The
#                     updater resolves releases/latest, compares against a stamp
#                     in /var/lib/runner-tools/, and installs only when newer.
#                     Supported asset shapes: a raw binary, a .tar.gz containing
#                     a binary named like the tool, or a .deb.
#
# name              source     spec                  asset
# ---------------------------------------------------------------------------
# CI-consumer tools the workflows expect pre-staged:
gh                  apt-repo   github-cli            -
shellcheck          apt        -                     -
minisign            apt        -                     -
git-lfs             apt        -                     -
zip                 apt        -                     -
unzip               apt        -                     -
# jq is also a hard dependency of runner-ephemeral-register.sh (it parses the
# registration-token JSON), so keeping it in the managed set guarantees it.
jq                  apt        -                     -
# python-is-python3 makes `python` resolve to python3 — the andook release path
# (.github/workflows/_reusable-publish-manifest.yml) invokes `python scripts/ci/
# publish_manifest.py`, not `python3`.
python-is-python3   apt        -                     -
# AWS CLI v2 — not in apt and not a GitHub-release asset; installed via AWS's
# official bundled installer (the canonical latest-v2 source). See the installer
# registry in runner-tools-update.sh. The andook release path runs `aws s3 cp`.
awscli              installer  aws-cli               -

# Build prerequisites (stable; distro builds are fine):
build-essential     apt        -                     -
mold                apt        -                     -
clang               apt        -                     -
lld                 apt        -                     -
pkg-config          apt        -                     -
libssl-dev          apt        -                     -
protobuf-compiler   apt        -                     -
cmake               apt        -                     -
perl                apt        -                     -

# Python CI helpers:
python3-pip         apt        -                     -
python3-yaml        apt        -                     -
python3-pytest      apt        -                     -

# ---------------------------------------------------------------------------
# To add a tool, copy one of the patterns above. Examples:
#
#   yq                github     mikefarah/yq          yq_linux_{arch}
#   git-lfs           apt-repo   packagecloud-git-lfs  -     # promote off distro
#
# For an apt-repo tool, also add a matching `repo_<id>` function to the repo
# registry in runner-tools-update.sh (the only place key URLs live, so they stay
# reviewable). github-cli is implemented there as the worked example.
