name: build-arm64-runner

# Builds + pushes ghcr.io/andook/arm64-runner — the ARC runner image for the
# MS-R1 arm64 k3s host (network-migration docs/15 §6). Runs natively on the
# org's arm64 hosted runners (no QEMU). Pushes with the workflow's GITHUB_TOKEN
# (packages: write) — no PAT needed.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'runner-image/**'
      - 'runner-tools/**'
      - '.github/workflows/build-arm64-runner.yml'
  schedule:
    # Weekly rebuild (Sun 04:00 UTC) — re-pulls the latest apt/gh/awscli
    # versions, matching the bare-metal runner-tools-update.timer cadence.
    - cron: '0 4 * * 0'

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/andook/arm64-runner

jobs:
  build:
    # arm64 GitHub-hosted runner (native build, no cross-arch emulation).
    runs-on: andook-ubuntu-medium
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute date tag
        id: meta
        run: echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runner-image/Containerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.date }}
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        env:
          DATE_TAG: ${{ steps.meta.outputs.date }}
          SHA_TAG: ${{ github.sha }}
        run: |
          {
            echo "### Built ${IMAGE}"
            echo "- \`${IMAGE}:latest\`"
            echo "- \`${IMAGE}:${DATE_TAG}\`"
            echo "- \`${IMAGE}:${SHA_TAG}\`"
            echo ""
            echo "Pin one of the immutable tags (date / sha) in the §7 scale-set values."
          } >> "$GITHUB_STEP_SUMMARY"
